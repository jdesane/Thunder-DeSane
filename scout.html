<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thunder Scout</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111318; --surface2: #181c22; --border: #2a2a2a;
    --text: #f0f0f0; --muted: #999; --dim: #555;
    --accent: #F0A000; --accent-hi: #FFBB33; --gold: #F0A000;
    --green: #34d399; --red: #ef4444; --orange: #f97316;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  
  .header { background:linear-gradient(135deg,#0a0a0f,#1a1500,#0a0a0f); border-bottom:1px solid var(--border); padding:16px; text-align:center; }
  .header-inner { display:flex; align-items:center; justify-content:center; gap:12px; }
  .header img { width:40px; height:40px; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(240,160,0,0.4)); }
  .header h1 { font-weight:900; font-size:24px; background:linear-gradient(135deg,#FFBB33,#F0A000); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .header p { font-size:12px; color:var(--muted); margin-top:2px; }

  .tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); overflow-x:auto; }
  .tab { flex:1; padding:12px 8px; text-align:center; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap; min-width:60px; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); background:rgba(240,160,0,0.05); }
  .badge { background:var(--border); color:var(--muted); font-size:10px; font-weight:700; padding:1px 6px; border-radius:8px; margin-left:4px; }
  .tab.active .badge { background:var(--accent); color:#000; }

  .panel { display:none; padding:16px; max-width:900px; margin:0 auto; }
  .panel.active { display:block; }

  .card { background:linear-gradient(145deg,#111318,#0d0d12); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; }
  
  label { display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:1px; }
  input[type="text"], select { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-family:'Outfit',sans-serif; font-size:14px; color:var(--text); outline:none; }
  input:focus, select:focus { border-color:var(--accent); }
  textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text); outline:none; resize:vertical; min-height:120px; line-height:1.6; }

  .btn { display:inline-flex; align-items:center; gap:6px; padding:10px 20px; border-radius:8px; font-family:'Outfit',sans-serif; font-size:13px; font-weight:600; border:none; cursor:pointer; transition:all 0.2s; }
  .btn-primary { background:linear-gradient(135deg,#F0A000,#FFBB33); color:#000; box-shadow:0 4px 16px rgba(240,160,0,0.3); }
  .btn-primary:hover { transform:translateY(-1px); }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-danger { background:rgba(239,68,68,0.15); color:var(--red); border:1px solid rgba(239,68,68,0.2); }
  .btn-sm { padding:6px 12px; font-size:11px; }
  .btn-row { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }
  
  .team-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; cursor:pointer; transition:all 0.2s; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .team-card:hover { border-color:var(--accent); background:var(--surface2); }
  
  .upload-zone { border:2px dashed var(--border); border-radius:12px; padding:24px; text-align:center; cursor:pointer; transition:all 0.2s; margin-bottom:12px; position:relative; }
  .upload-zone:hover { border-color:var(--accent); background:rgba(240,160,0,0.03); }
  .upload-zone.has-file { border-color:var(--green); border-style:solid; background:rgba(52,211,153,0.05); }
  .upload-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .upload-zone .icon { font-size:32px; margin-bottom:8px; }
  .upload-zone .label { font-size:13px; color:var(--muted); }
  .upload-zone .filename { font-size:12px; color:var(--green); font-family:'JetBrains Mono',monospace; margin-top:4px; }
  .upload-zone img.preview { max-width:100%; max-height:150px; border-radius:8px; margin-top:8px; object-fit:contain; }

  .player-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }
  .player-row:hover { background:var(--surface2); }
  .jersey { color:var(--accent); font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; min-width:36px; }

  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:100; justify-content:center; align-items:center; padding:20px; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; width:100%; max-width:420px; }
  .modal h3 { font-size:18px; margin-bottom:16px; color:var(--accent); }
  .modal .field { margin-bottom:12px; }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--accent); color:#000; padding:10px 24px; border-radius:8px; font-weight:600; font-size:13px; z-index:200; display:none; }
  .toast.show { display:block; animation: fadeInUp 0.3s ease; }
  @keyframes fadeInUp { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

  .progress { background:var(--surface2); border-radius:8px; padding:16px; margin:12px 0; text-align:center; }
  .progress .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-right:8px; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .progress .status { color:var(--accent); font-size:13px; font-weight:600; }

  .empty { text-align:center; padding:48px 20px; color:var(--dim); }
  .empty h3 { color:var(--muted); font-size:16px; margin-bottom:6px; }

  .scouting-table { width:100%; border-collapse:collapse; font-size:11px; font-family:'JetBrains Mono',monospace; }
  .scouting-table th { padding:8px 5px; text-align:center; color:var(--accent); font-size:10px; text-transform:uppercase; background:var(--surface2); border-bottom:2px solid var(--accent); white-space:nowrap; }
  .scouting-table th:first-child { text-align:left; }
  .scouting-table td { padding:6px 5px; text-align:center; color:var(--muted); border-bottom:1px solid var(--border); }
  .scouting-table td:first-child { text-align:left; color:var(--text); font-weight:600; white-space:nowrap; }
  .section-title { font-size:13px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin:20px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .danger-high { background:rgba(239,68,68,0.2); color:var(--red); border:1px solid rgba(239,68,68,0.3); padding:3px 10px; border-radius:16px; font-size:10px; font-weight:700; }
  .danger-med { background:rgba(249,115,22,0.2); color:var(--orange); border:1px solid rgba(249,115,22,0.3); padding:3px 10px; border-radius:16px; font-size:10px; font-weight:700; }
  .danger-low { background:rgba(52,211,153,0.2); color:var(--green); border:1px solid rgba(52,211,153,0.3); padding:3px 10px; border-radius:16px; font-size:10px; font-weight:700; }

  @media print {
    body { background:#fff; color:#000; }
    .header,.tabs,#teamsPanel,#addGamePanel { display:none !important; }
    .panel { display:block !important; max-width:100%; }
    .scouting-table th { background:#eee; color:#000; border-bottom:2px solid #000; }
    .scouting-table td { color:#333; border-bottom:1px solid #ccc; }
    .jersey { color:#000; }
  }
</style>
</head>

<script>
const SUPA_URL = "https://zyonidiybzrgklrmalbt.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5b25pZGl5YnpyZ2tscm1hbGJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTY5NzUsImV4cCI6MjA4ODI5Mjk3NX0.5See-qjLkXA4CoJi9tNfcLAX_cdvZhPaxw8iViKM8S8";
const CLAUDE_MODEL = "claude-sonnet-4-20250514";

// =====================================================
// SUPABASE
// =====================================================
async function supa(table, method, body, query) {
  const url = SUPA_URL + '/rest/v1/' + table + (query || '');
  const headers = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json',
    'Prefer': method === 'POST' ? 'return=representation' : method === 'PATCH' ? 'return=representation' : 'return=minimal' };
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) { console.error('Supa error:', await res.text()); return null; }
  if (method === 'DELETE') return true;
  try { return await res.json(); } catch { return true; }
}

// =====================================================
// STATE
// =====================================================
let teams = [], selectedTeamId = null, currentPlayers = [], currentGames = [], currentAtBats = [];

function showPanel(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const tabs = document.querySelectorAll('.tab');
  const map = {teams:0, addGame:1, report:2, lineup:3};
  if (map[name] !== undefined) tabs[map[name]].classList.add('active');
  document.getElementById(name + 'Panel').classList.add('active');
}

function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

function showAddGame() {
  // Always render the form, even if no team is selected yet
  const team = selectedTeamId ? teams.find(t => t.id === selectedTeamId) : null;
  renderAddGame(team);
  showPanel('addGame');
}

// =====================================================
// TEAMS
// =====================================================
async function loadTeams() {
  teams = await supa('scout_teams', 'GET', null, '?order=name.asc') || [];
  let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">';
  h += '<h2 style="font-size:18px;font-weight:800;">Opponent Teams</h2>';
  h += '<button class="btn btn-primary btn-sm" onclick="promptNewTeam()">+ New Team</button></div>';

// =====================================================
// CLAUDE API - Extract data from screenshots
// =====================================================
// Resize image to max dimension to reduce API payload
function resizeImage(b64, mime, maxDim) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = function() {
      let w = img.width, h = img.height;
      if (w <= maxDim && h <= maxDim) { resolve({b64, mime}); return; }
      const scale = maxDim / Math.max(w, h);
      w = Math.round(w * scale); h = Math.round(h * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      resolve({ b64: dataUrl.split(',')[1], mime: 'image/jpeg' });
    };
    img.onerror = () => resolve({b64, mime});
    img.src = 'data:' + mime + ';base64,' + b64;
  });
}

async function callClaude(images, prompt) {
  const content = [];
  for (const img of images) {
    // Resize to max 1600px to keep payload reasonable
    const resized = await resizeImage(img.b64, img.mime, 1600);
    content.push({ b64: resized.b64, mime: resized.mime });
  }
  
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 120000); // 2 min timeout
    
    const res = await fetch(SUPA_URL + '/functions/v1/scout-vision', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPA_KEY
      },
      body: JSON.stringify({ images: content, prompt }),
      signal: controller.signal
    });
    clearTimeout(timeout);
    
    if (!res.ok) {
      const errText = await res.text();
      console.error('Edge function error:', res.status, errText);
      alert('Error processing screenshot (status ' + res.status + '). Check console for details.');
      return '';
    }
    
    const data = await res.json();
    console.log('Claude response:', data);
    
    if (data.error) {
      alert('Claude API error: ' + data.error + (data.detail ? '\n' + data.detail : ''));
      return '';
    }
    
    return data.text || '';
  } catch(e) {
    if (e.name === 'AbortError') {
      alert('Request timed out after 2 minutes. Try with a smaller screenshot.');
    } else {
      console.error('Request failed:', e);
      alert('Request failed: ' + e.message);
    }
    return '';
  }
}

async function extractBoxScore(img) {
  const prompt = `Extract ALL data from this GameChanger box score screenshot.

Return ONLY valid JSON in this exact format, no other text:
{
  "game_date": "Sat Mar 28",
  "score": "3-0",
  "team1": { "name": "Full Team Name As Shown", "players": [{"order":1,"name":"First Last","jersey":"4","position":"CF"}] },
  "team2": { "name": "Full Team Name As Shown", "players": [{"order":1,"name":"First Last","jersey":"99","position":"SS"}] }
}

Rules:
- "game_date" is the date shown at the top of the page (e.g. "Sat Mar 28" or "Sun Jan 25")
- "score" is the final score like "3-0" or "17-16" (team1 score first, then team2)
- "name" in each team is the FULL team name exactly as displayed (e.g. "PLO Bulldogs White 8U - Tournaments" or "WBT Cobras 8U Blue")
- "order" is the batting order (1st listed = 1, 2nd = 2, etc.)
- Player "name" should be the display name from GC like "Jasper S" or "Chad JR R"
- "jersey" is just the number without #
- "position" is the position abbreviation shown in parentheses (SS, CF, P, etc.)
- Include ALL players listed for BOTH teams
- team1 is the team on the LEFT side of the box score, team2 is on the RIGHT`;
  
  const raw = await callClaude([img], prompt);
  try {
    const cleaned = raw.replace(/```json|```/g, '').trim();
    return JSON.parse(cleaned);
  } catch(e) {
    console.error('Box score parse error:', raw);
    return null;
  }
}

async function extractPlays(img, savedTeams) {
  // Build roster context so Claude can resolve initials to full names
  const teamNamesList = (savedTeams || []).map(st => `"${st.teamName}"`).join(' or ');
  const rosterLines = (savedTeams || []).map(st => {
    const lineup = [...st.players].sort((a,b) => (a.lineup_order||99)-(b.lineup_order||99));
    const rows = lineup.map((p,i) => `  ${i+1}. ${p.name}${p.jersey_number ? ' #'+p.jersey_number : ''}${p.position ? ' ('+p.position+')' : ''}`).join('\n');
    return `"${st.teamName}":\n${rows}`;
  }).join('\n\n');

  const prompt = `Extract ALL plays from this GameChanger Plays tab screenshot.

ROSTERS (use these to resolve abbreviated batter names and team names):
${rosterLines}

PLAYER NAME RULES:
- In GameChanger plays, batters appear abbreviated like "C R" or "C. R" meaning first initial + last initial
- Match each abbreviated name to the FULL NAME from the rosters above using first and last initials
- The batting order in the plays cycles through the roster lineup order (1st batter = lineup slot 1, 2nd = slot 2, etc.)
- Output ONLY names that exist in the rosters above (e.g. "Chad JR R" not "C R")
- NEVER append result words like "Out", "Single", "Double" to a player name
- If you cannot confidently match a batter to the roster, output just the 2-letter initials (e.g. "C R") - do NOT invent a name

TEAM NAME RULES:
- The valid team names for this game are: ${teamNamesList}
- Inning headers look like "Top 3rd - TEAM NAME" or "Bottom 1st - TEAM NAME"
- For the "team" field, you MUST use one of the exact team name strings listed above
- Match the team in the inning header to the closest name from the list above

Return ONLY valid JSON array, no other text:
[
  {"inning":1,"half":"top","team":"PLO Bulldogs White 8U - Tournaments","result":"Ground Out","player":"Chad JR R","description":"C R grounds out, pitcher to first baseman","direction":"Right","field_position":"1B","ball_type":"Ground"},
  {"inning":1,"half":"bottom","team":"8u Original Florida Pokers Of Parkland-Blue","result":"Single","player":"Lucas R","description":"L R singles to center","direction":"Center","field_position":"CF","ball_type":"Ground"}
]

- "result" should be: Single, Double, Triple, Home Run, Ground Out, Fly Out, Line Out, Pop Out, Strikeout, Error, Fielder's Choice, Walk, HBP, Double Play
- "direction" should be: Left, Center, Right, Middle, or empty if unclear
- "field_position" should be: LF, CF, RF, SS, 2B, 3B, 1B, P, C or empty
- "ball_type" should be: Fly, Ground, Line, or empty
- Include EVERY at-bat for BOTH teams

  const raw = await callClaude([img], prompt);

async function submitGame() {
  const manualPlays = document.getElementById('manualPlays')?.value?.trim();
  const manualRoster = document.getElementById('manualRoster')?.value?.trim();
  
  let rosterData = null, playsData = null;
  
  if (boxScoreFile || playsFile) {
    // SCREENSHOT MODE
    if (boxScoreFile) {
      setProgress(true, 'Reading box score... (resizing + sending to Claude, ~30 sec)');
      rosterData = await extractBoxScore(boxScoreFile);
      if (!rosterData) { setProgress(false); return; }
    }
    // NOTE: plays extraction is deferred until AFTER rosters are saved, so we can pass full names to Claude
  } else if (manualPlays) {
    alert('For manual entry, please select a team from the Teams tab first, then come back here.');
    return;
  } else {
    alert('Upload at least a box score or plays screenshot.');
    return;
  }
  
  setProgress(true, 'Creating teams & saving rosters...');
  
  // Get game info from box score
  const gameDate = rosterData?.game_date || '';
  const gameScore = rosterData?.score || '';
  
  // Process BOTH teams from the box score
  const allTeamData = [rosterData?.team1, rosterData?.team2].filter(Boolean);
  const savedTeams = []; // {teamId, teamName, players[]}
  
  for (const td of allTeamData) {
    if (!td.name) continue;
    
    // Find or create team in database
    let existingTeam = teams.find(t => {
      if (t.name.toLowerCase() === td.name.toLowerCase()) return true;
      // Ignore generic words that appear in many team names
      const stopWords = new Set(['8u','9u','10u','11u','12u','tournaments','tournament','white','blue','red','black','gold','silver','select','elite','travel']);
      const tWords = new Set(t.name.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !stopWords.has(w)));
      const tdWords = td.name.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !stopWords.has(w));
      const shared = tdWords.filter(w => tWords.has(w));
      return shared.length >= 2;
    });
    
    let teamId;
    if (existingTeam) {
      teamId = existingTeam.id;
    } else {
      // Auto-create team
      const newTeam = await supa('scout_teams', 'POST', { name: td.name, season: 'Spring 2026' });
      if (!newTeam?.[0]) continue;
      teamId = newTeam[0].id;
      teams.push(newTeam[0]); // Add to local state
    }
    
    // Load existing players for this team
    const teamPlayers = await supa('scout_players', 'GET', null, `?team_id=eq.${teamId}&order=lineup_order.asc.nullslast,name.asc`) || [];
    
    // Upsert players from box score
    for (const p of td.players || []) {
      const existing = matchPlayer(p.name, teamPlayers);
      if (existing) {
        const updates = { lineup_order: p.order };
        if (p.jersey) updates.jersey_number = p.jersey;
        if (p.position) updates.position = p.position;
        await supa('scout_players', 'PATCH', updates, `?id=eq.${existing.id}`);
        existing.lineup_order = p.order;
        if (p.jersey) existing.jersey_number = p.jersey;
        if (p.position) existing.position = p.position;
      } else {
        const newP = await supa('scout_players', 'POST', { team_id: teamId, name: p.name, jersey_number: p.jersey||null, position: p.position||null, lineup_order: p.order });
        if (newP?.[0]) teamPlayers.push(newP[0]);
      }
    }
    
    savedTeams.push({ teamId, teamName: td.name, players: teamPlayers });
  }

  if (!savedTeams.length) { setProgress(false); alert('No teams found in box score.'); return; }

  // Now extract plays WITH roster context so Claude can resolve initials to full names
  if (playsFile) {
    setProgress(true, 'Reading plays... (sending roster + screenshot to Claude, ~60 sec)');
    playsData = await extractPlays(playsFile, savedTeams);
    if (!playsData) { setProgress(false); alert('Could not read plays. Try again.'); return; }
  }

  setProgress(true, 'Saving at-bats...');
  
  // Save a game record for EACH team and process their plays
  let totalSaved = 0;
  
  for (const st of savedTeams) {
    // Save game record for this team
    const opponent = savedTeams.find(s => s.teamId !== st.teamId)?.teamName || '';
    const gameResult = await supa('scout_games', 'POST', { team_id: st.teamId, game_date: gameDate, score: gameScore, opponent });
    if (!gameResult?.[0]) continue;
    const gameId = gameResult[0].id;
    
    // Find plays for this team
    if (playsData && playsData.length) {
      const playTeamNames = [...new Set(playsData.map(p => p.team).filter(Boolean))];
      let matchedPlayTeam = '';
      // Try exact match first (Claude should output exact team names now)
      matchedPlayTeam = playTeamNames.find(ptn => ptn.toLowerCase() === st.teamName.toLowerCase()) || '';
      // Fall back to word-overlap matching if exact fails
      if (!matchedPlayTeam) {
        const stopWords = new Set(['8u','9u','10u','11u','tournaments','white','blue','red','black','gold']);
        for (const ptn of playTeamNames) {
          if (!ptn) continue;
          const pWords = new Set(ptn.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !stopWords.has(w)));
          const sWords = st.teamName.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !stopWords.has(w));
          const shared = sWords.filter(w => pWords.has(w));
          if (shared.length >= 2) { matchedPlayTeam = ptn; break; }
        }
      }
      
      const teamPlays = matchedPlayTeam ? playsData.filter(p => p.team === matchedPlayTeam) : [];
      
      for (const play of teamPlays) {
        if (!play.player || play.player.length < 2) continue;
        
        let reachedOn = 'Out';
        const r = (play.result || '').toLowerCase();
        if (r.includes('single')||r.includes('double')||r.includes('triple')||r.includes('home run')) reachedOn = 'Hit';
        else if (r.includes('error')) reachedOn = 'Error';
        else if (r.includes('fielder')) reachedOn = 'FC';
        else if (r.includes('walk')||r==='bb') reachedOn = 'Walk';
        else if (r.includes('hbp')||r.includes('hit by')) reachedOn = 'HBP';
        
        let ballType = play.result || '';
        if (r.includes('ground out')||r.includes('groundout')) ballType = 'Ground Out';
        else if (r.includes('fly out')||r.includes('flyout')) ballType = 'Fly Out';
        else if (r.includes('line out')||r.includes('lineout')) ballType = 'Line Out';
        else if (r.includes('pop out')) ballType = 'Pop Out';
        else if (r.includes('strikeout')) ballType = 'Strikeout';
        
        const player = matchPlayer(play.player, st.players);
        const resolvedName = player ? player.name : play.player;
        
        await supa('scout_at_bats', 'POST', {
          game_id: gameId, team_id: st.teamId,
          player_id: player?.id || null, player_name: resolvedName,
          inning: play.inning, half: play.half,
          result: play.result, ball_type: ballType,
          hit_direction: play.ball_type || '', field_position: play.field_position || '',
          spray_zone: play.direction || '', reached_on: reachedOn,
          rbi: 0, description: play.description || ''
        });
        totalSaved++;
      }
    }
  }
  
  setProgress(false);
  toast(`Done! ${savedTeams.length} teams, ${totalSaved} at-bats saved.`);
  
  // Reload teams and select the first saved team
  await loadTeams();
  if (savedTeams.length > 0) {
    await selectTeam(savedTeams[0].teamId);
  }
}

// =====================================================
// PLAYER MATCHING
// =====================================================
function matchPlayer(playName, roster) {
  if (!playName || !roster.length) return null;
  const pn = playName.replace(/\./g,'').trim();
  let match = roster.find(r => r.name.toLowerCase() === pn.toLowerCase());
  if (match) return match;
  const parts = pn.split(/\s+/);
  if (parts.length < 2) return null;
  const firstPart = parts[0], lastPart = parts[parts.length - 1];
  if (firstPart.length <= 2) {
    const fi = firstPart[0].toUpperCase(), li = lastPart[0].toUpperCase();
    const candidates = roster.filter(r => {
      const rp = r.name.replace(/\./g,'').trim().split(/\s+/);
      if (rp.length < 2) return false;
      return rp[0][0].toUpperCase() === fi && rp[rp.length-1][0].toUpperCase() === li;
    });
    if (candidates.length === 1) return candidates[0];
    if (candidates.length > 1 && firstPart.length === 2) {
      const narrow = candidates.filter(r => r.name.toUpperCase().startsWith(firstPart.toUpperCase()));
      if (narrow.length === 1) return narrow[0];
    }
    if (candidates.length > 0) return candidates[0];
  }
  match = roster.find(r => { const rp = r.name.trim().split(/\s+/); return rp[0].toLowerCase() === firstPart.toLowerCase() && rp[rp.length-1][0].toUpperCase() === lastPart[0].toUpperCase(); });
  if (match) return match;
  if (firstPart.length >= 3) { match = roster.find(r => r.name.toLowerCase().startsWith(firstPart.toLowerCase())); if (match) return match; }
  return null;
}

// Manual parser fallback
function parseRosterText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const entries = []; let order = 0;
  for (const line of lines) {
    let name='',number='',position='';
    const nm = line.match(/#(\d+)/); if (nm) number = nm[1];
    const pm = line.match(/\(([A-Z0-9,\s]{1,8})\)/i); if (pm) position = pm[1];
    else { const tp = line.match(/\b(CF|LF|RF|SS|1B|2B|3B|SF|C|P|DH|EH)\s*$/i); if (tp) position = tp[1]; }
    let cl = line.replace(/#\d+/g,'').replace(/\([^)]*\)/g,'').replace(/\b(CF|LF|RF|SS|1B|2B|3B|SF|C|P|DH|EH)\b/gi,'').replace(/,/g,' ').replace(/\s+/g,' ').trim();
    if (cl.length >= 2) name = cl;
    if (name) { order++; entries.push({name,number,position,lineup_order:order}); }
  }
  return entries;
}

function parsePlayByPlay(rawText) {
  const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const atBats = []; let inn=0,half='',bTeam=''; const teamsFound = new Set(); let i=0;
  const rts = ['Single','Double','Triple','Home Run','Ground Out','Groundout','Fly Out','Flyout','Line Out','Lineout','Pop Out','Popout','Strikeout','Strike Out','Error',"Fielder's Choice",'Fielders Choice','Walk','BB','Hit By Pitch','HBP','Sac Fly','Sacrifice','Double Play','Inning Ended'];
  while (i < lines.length) {
    const line = lines[i];
    const im = line.match(/^(Top|Bottom)\s+(\d+\w{0,2})\s*[-–—]\s*(.+)/i);
    if (im) { half=im[1].toLowerCase(); inn=parseInt(im[2]); bTeam=im[3].trim(); teamsFound.add(bTeam); i++; continue; }
    if (line.match(/^(Inning Ended|Half|Stolen|Wild|Passed|Balk|Picked|Advanced|Scored|Pitching|Batting|Lineup|Defensive|Offensive|Timeout|Mound)/i)) { i++; continue; }
    let mr = null; for (const rt of rts) { if (line.toLowerCase().startsWith(rt.toLowerCase())) { mr=rt; break; } }
    if (mr && !line.match(/^Inning Ended/i)) {
      const ab = {result:mr,inning:inn,half,team:bTeam,playerName:'',ballType:'',hitDirection:'',fieldPosition:'',sprayZone:'',reachedOn:'Out',rbi:0,description:'',cleanDesc:''};
      i++; let dl=[];
      while (i<lines.length) { const n=lines[i]; if (rts.some(rt=>n.toLowerCase().startsWith(rt.toLowerCase()))||n.match(/^(Top|Bottom)\s+\d+/i)) break; dl.push(n); i++; }
      ab.description=dl.join(' ');
      let cd=ab.description; const ip=cd.lastIndexOf('In play.'); if(ip>=0) cd=cd.substring(ip+8).trim(); else cd=cd.replace(/^(Ball\s*\d+,?\s*|Strike\s*\d+\s*\w*,?\s*|Foul,?\s*)*\.?\s*/gi,'').trim();
      ab.cleanDesc=cd;
      const nm=cd.match(/^([A-Z][A-Za-z]*\.?\s+[A-Z][a-zA-Z']*)/); if(nm) ab.playerName=nm[1].trim();
      const rl=mr.toLowerCase();
      if(rl.includes('single')){ab.reachedOn='Hit';ab.ballType='Single';}else if(rl.includes('double')&&!rl.includes('play')){ab.reachedOn='Hit';ab.ballType='Double';}else if(rl.includes('triple')){ab.reachedOn='Hit';ab.ballType='Triple';}
      else if(rl.includes('ground out')||rl.includes('groundout')){ab.reachedOn='Out';ab.ballType='Ground Out';}else if(rl.includes('fly out')||rl.includes('flyout')){ab.reachedOn='Out';ab.ballType='Fly Out';}
      else if(rl.includes('line out')||rl.includes('lineout')){ab.reachedOn='Out';ab.ballType='Line Out';}else if(rl.includes('strikeout')||rl.includes('strike out')){ab.reachedOn='Out';ab.ballType='Strikeout';}
      else if(rl.includes('error')){ab.reachedOn='Error';ab.ballType='Error';}else if(rl.includes('fielder')){ab.reachedOn='FC';ab.ballType='FC';}
      else if(rl.includes('walk')||rl==='bb'){ab.reachedOn='Walk';ab.ballType='Walk';}
      const d=cd.toLowerCase();
      if(d.includes('left field')||d.includes('to left')){ab.sprayZone='Left';ab.fieldPosition='LF';}
      else if(d.includes('center field')||d.includes('to center')){ab.sprayZone='Center';ab.fieldPosition='CF';}
      else if(d.includes('right field')||d.includes('to right')){ab.sprayZone='Right';ab.fieldPosition='RF';}
      else if(d.includes('shortstop')){ab.sprayZone='Middle';ab.fieldPosition='SS';}
      else if(d.includes('second base')){ab.sprayZone='Middle';ab.fieldPosition='2B';}
      else if(d.includes('third base')){ab.sprayZone='Left';ab.fieldPosition='3B';}
      else if(d.includes('first base')){ab.sprayZone='Right';ab.fieldPosition='1B';}
      if(d.includes('fly ball')||d.includes('flies out')) ab.hitDirection='Fly';
      else if(d.includes('ground ball')||d.includes('grounds out')||d.includes('grounds to')) ab.hitDirection='Ground';
      else if(d.includes('line drive')||d.includes('lines out')) ab.hitDirection='Line';
      atBats.push(ab); continue;
    }
    i++;
  }
  return {atBats, teams:Array.from(teamsFound)};
}

// =====================================================
// SCOUTING REPORT
// =====================================================
function buildPlayerStats(atBats) {
  const map = {};
  for (const ab of atBats) {
    const raw = ab.player_name || ab.playerName;
    if (!raw || raw.length < 2) continue;
    const rm = matchPlayer(raw, currentPlayers);
    const key = rm ? rm.name : raw;
    if (!map[key]) {
      const pl = rm || currentPlayers.find(p => p.name === key);
      map[key] = { name:key, playerId:pl?.id, jersey:pl?.jersey_number, position:pl?.position, lineupOrder:pl?.lineup_order||99,
        AB:0,H:0,singles:0,doubles:0,triples:0,HR:0,outs:0,errors:0,FC:0,K:0,BB:0,HBP:0,
        flyBalls:0,groundBalls:0,lineDrives:0,left:0,center:0,right:0,middle:0,RBI:0 };
    }
    const p = map[key];
    const ro = ab.reached_on||ab.reachedOn, bt = ab.ball_type||ab.ballType;
    if(ro!=='Walk'&&ro!=='HBP') p.AB++;
    if(ro==='Hit'){p.H++;if(bt==='Single')p.singles++;else if(bt==='Double')p.doubles++;else if(bt==='Triple')p.triples++;else if(bt==='Home Run')p.HR++;}
    else if(ro==='Out'){p.outs++;if(bt==='Strikeout')p.K++;}
    else if(ro==='Error')p.errors++;else if(ro==='FC')p.FC++;else if(ro==='Walk')p.BB++;else if(ro==='HBP')p.HBP++;
    const hd=ab.hit_direction||ab.hitDirection;
    if(hd==='Fly')p.flyBalls++;else if(hd==='Ground')p.groundBalls++;else if(hd==='Line')p.lineDrives++;
    const sz=ab.spray_zone||ab.sprayZone;
    if(sz==='Left')p.left++;else if(sz==='Center')p.center++;else if(sz==='Right')p.right++;else if(sz==='Middle')p.middle++;
    p.RBI+=(ab.rbi||0);
  }
  const list = Object.values(map).filter(p => p.AB>0||p.BB>0);
  list.sort((a,b) => (a.lineupOrder||99)-(b.lineupOrder||99)||a.name.localeCompare(b.name));
  return list;
}

function renderReport(team) {
  if (!currentAtBats.length) {
    document.getElementById('reportPanel').innerHTML = `<div class="empty"><h3>No data yet</h3><p>Go to "+ ADD GAME" to submit your first game for ${team.name}</p></div>`;
    return;
  }
  const stats = buildPlayerStats(currentAtBats);
  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
    <div><h2 style="font-size:18px;font-weight:800;">${team.name}</h2>
    <div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">${currentGames.length} games &middot; ${currentAtBats.length} at-bats &middot; ${stats.length} players</div></div>
    <button class="btn btn-secondary btn-sm" onclick="window.print()">&#128424; Print</button></div>`;
  
  h += '<div class="section-title">Scouting Summary</div>';
  h += '<div style="overflow-x:auto;"><table class="scouting-table"><thead><tr>';
  h += '<th style="text-align:left">Player</th><th>AB</th><th>H</th><th>1B</th><th>2B</th><th>3B</th><th>HR</th><th>AVG</th><th>K</th><th>BB</th><th>ROE</th><th style="text-align:left">Hit Tendency</th><th style="text-align:left">Spray</th><th style="text-align:left">Notes</th>';
  h += '</tr></thead><tbody>';
  
  for (const p of stats) {
    const avg = p.AB>0?p.H/p.AB:0;
    const ht=[p.flyBalls>0?'Fly('+p.flyBalls+')':'',p.groundBalls>0?'GB('+p.groundBalls+')':'',p.lineDrives>0?'LD('+p.lineDrives+')':''].filter(Boolean).join(', ')||'-';
    const sp=[p.left>0?'L('+p.left+')':'',p.center>0?'C('+p.center+')':'',p.right>0?'R('+p.right+')':'',p.middle>0?'M('+p.middle+')':''].filter(Boolean).join(', ')||'-';
    const notes=[];
    if(avg>=0.500)notes.push('DANGEROUS');else if(avg>=0.400)notes.push('Hot bat');
    const xbh=p.doubles+p.triples+p.HR; if(xbh>0)notes.push('XBH('+p.doubles+' 2B,'+p.triples+' 3B)');
    if(p.K>=2)notes.push('Will K');if(p.errors>=2)notes.push('Causes errors');
    const ac=avg>=0.400?'var(--red)':avg>=0.300?'var(--orange)':'var(--muted)';
    const rb=avg>=0.400?'rgba(239,68,68,0.06)':avg>=0.300?'rgba(249,115,22,0.04)':'transparent';
    const ln=p.lineupOrder&&p.lineupOrder<99?'<span style="color:var(--dim);font-size:10px;margin-right:3px">'+p.lineupOrder+'.</span>':'';
    const j=p.jersey?'<span style="color:var(--accent)">#'+p.jersey+'</span> ':'';
    const ps=p.position?' <span style="color:var(--dim);font-size:9px">('+p.position+')</span>':'';
    h+=`<tr style="background:${rb};cursor:pointer" onclick="editPlayer('${p.playerId||''}','${p.name.replace(/'/g,"\\'")}')">`;
    h+=`<td>${ln}${j}${p.name}${ps}</td><td>${p.AB}</td><td style="font-weight:700">${p.H}</td><td>${p.singles}</td>`;
    h+=`<td style="color:${p.doubles>0?'var(--orange)':'var(--muted)'}">${p.doubles}</td>`;
    h+=`<td style="color:${p.triples>0?'var(--orange)':'var(--muted)'}">${p.triples}</td>`;
    h+=`<td style="color:${p.HR>0?'var(--red)':'var(--muted)'}">${p.HR}</td>`;
    h+=`<td style="font-weight:700;color:${ac}">${avg.toFixed(3)}</td>`;
    h+=`<td>${p.K}</td><td>${p.BB}</td><td>${p.errors}</td>`;
    h+=`<td style="text-align:left;font-size:10px">${ht}</td><td style="text-align:left;font-size:10px">${sp}</td>`;
    h+=`<td style="text-align:left;font-size:10px;max-width:140px">${notes.join('; ')||'-'}</td></tr>`;
  }
  h += '</tbody></table></div>';
  
  h += '<div class="section-title">Defensive Positioning</div>';
  for (const p of stats) {
    const avg=p.AB>0?p.H/p.AB:0;
    const bm=Math.max(p.flyBalls,p.groundBalls,p.lineDrives);
    const pb=bm===0?'No data':p.flyBalls===bm?'Fly Ball':p.groundBalls===bm?'Ground Ball':'Line Drive';
    const dm=Math.max(p.left,p.center,p.right,p.middle);
    const pd=dm===0?'Spray':p.left===dm?'Left/Pull':p.center===dm?'Center':p.right===dm?'Right/Oppo':'Middle';
    const recs=[];
    if(p.groundBalls>p.flyBalls&&p.left>0)recs.push('Shade left');else if(p.flyBalls>p.groundBalls&&p.center>0)recs.push('CF straight');
    if(p.errors>=2)recs.push('Field cleanly');if(avg>=0.400)recs.push('No free passes');if(p.K>=2)recs.push('Work count');
    const dot=avg>=0.400?'🔴':avg>=0.300?'🟡':'🟢';
    const ln=p.lineupOrder&&p.lineupOrder<99?'<span style="color:var(--dim);font-size:11px;margin-right:3px">'+p.lineupOrder+'.</span>':'';
    const j=p.jersey?'<span style="color:var(--accent)">#'+p.jersey+'</span> ':'';
    h+=`<div class="player-row" onclick="editPlayer('${p.playerId||''}','${p.name.replace(/'/g,"\\'")}')">`;
    h+=`<span style="font-size:14px">${dot}</span><div style="flex:1"><div style="font-weight:700;font-size:13px">${ln}${j}${p.name}</div>`;
    h+=`<div style="font-size:11px;color:var(--dim)">${avg.toFixed(3)} &middot; ${pb} &middot; ${pd} &middot; ${recs.join(', ')||'Standard'}</div></div></div>`;
  }
  
  h += '<div class="section-title">Roster (tap to edit)</div>';
  for (const p of currentPlayers) {
    h+=`<div class="player-row" onclick="editPlayer('${p.id}','${p.name.replace(/'/g,"\\'")}')">`;
    h+=`<span class="jersey">${p.jersey_number?'#'+p.jersey_number:'--'}</span>`;
    h+=`<div style="flex:1"><div style="font-weight:600;font-size:14px">${p.lineup_order&&p.lineup_order<99?'<span style="color:var(--dim);font-size:11px">'+p.lineup_order+'. </span>':''}${p.name}</div>`;
    h+=`<div style="font-size:11px;color:var(--dim)">${p.position||'No position'}</div></div><span style="color:var(--dim)">&#9998;</span></div>`;
  }
  document.getElementById('reportPanel').innerHTML = h;
}

function renderLineup(team) {
  const stats = buildPlayerStats(currentAtBats);
  if (!stats.length) { document.getElementById('lineupPanel').innerHTML = '<div class="empty"><h3>No data</h3></div>'; return; }
  let h = `<h2 style="font-size:18px;font-weight:800;margin-bottom:12px">${team.name} — Batting Order</h2>`;
  for (const p of stats) {
    const avg=p.AB>0?p.H/p.AB:0;
    let d=avg>=0.500?5:avg>=0.400?4:avg>=0.300?3:avg>=0.200?2:1;
    if(p.doubles+p.triples+p.HR>=2)d=Math.min(d+1,5);
    const cls=d>=4?'danger-high':d>=3?'danger-med':'danger-low';
    const emoji=d>=4?'🔴':d>=3?'🟡':'🟢';
    const ln=p.lineupOrder&&p.lineupOrder<99?'<span style="color:var(--dim);font-size:11px;margin-right:3px">'+p.lineupOrder+'.</span>':'';
    const j=p.jersey?'<span style="color:var(--accent)">#'+p.jersey+'</span> ':'';
    const bt=[p.flyBalls>0?'FLY:'+p.flyBalls:'',p.groundBalls>0?'GB:'+p.groundBalls:'',p.lineDrives>0?'LD:'+p.lineDrives:''].filter(Boolean).join(' ');
    const dirs=[p.left>0?'L:'+p.left:'',p.center>0?'C:'+p.center:'',p.right>0?'R:'+p.right:'',p.middle>0?'M:'+p.middle:''].filter(Boolean).join(' ');
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);">
      <span style="font-size:18px">${emoji}</span><div style="flex:1">
      <div style="font-weight:700;font-size:14px">${ln}${j}${p.name}</div>
      <div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">${avg.toFixed(3)} AVG &middot; ${p.AB} AB &middot; ${p.H} H ${p.K>0?'&middot; '+p.K+' K':''} ${bt?'&middot; '+bt:''} ${dirs?'&middot; '+dirs:''}</div>
      </div><span class="${cls}">${d}/5</span></div>`;
  }
  document.getElementById('lineupPanel').innerHTML = h;
}

// =====================================================
// EDIT PLAYER
// =====================================================
function editPlayer(playerId, playerName) {
  const player = currentPlayers.find(p => p.id === playerId) || currentPlayers.find(p => p.name === playerName);
  document.getElementById('editName').value = player?.name || playerName || '';
  document.getElementById('editJersey').value = player?.jersey_number || '';
  document.getElementById('editPosition').value = player?.position || '';
  document.getElementById('editLineup').value = player?.lineup_order || '';
  document.getElementById('editNotes').value = player?.notes || '';
  document.getElementById('editPlayerId').value = player?.id || '';
  document.getElementById('editModal').classList.add('show');
}

async function savePlayer() {
  const id = document.getElementById('editPlayerId').value;
  const data = { name: document.getElementById('editName').value, jersey_number: document.getElementById('editJersey').value||null,
    position: document.getElementById('editPosition').value||null, lineup_order: parseInt(document.getElementById('editLineup').value)||null,
    notes: document.getElementById('editNotes').value||null, updated_at: new Date().toISOString() };
  if (id) await supa('scout_players', 'PATCH', data, `?id=eq.${id}`);
  else { data.team_id = selectedTeamId; await supa('scout_players', 'POST', data); }
  closeModal(); toast('Player updated!');
  await selectTeam(selectedTeamId); showPanel('report');
}

function closeModal() { document.getElementById('editModal').classList.remove('show'); }
document.getElementById('editModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

loadTeams();
